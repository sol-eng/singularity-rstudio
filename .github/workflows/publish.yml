on:
  workflow_dispatch:
  push:
    branches: 
      - "**"
  pull_request:
    branches: 
      - main

name: Regression Testing 

jobs:
  build-jammy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Ubuntu Jammy
        uses: ./.github/actions/singularity
        with:
          linux_distro: "jammy"
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  build-noble:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Ubuntu Focal
        uses: ./.github/actions/singularity
        with:
          linux_distro: "noble"
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  build-rockylinux8:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Rocky Linux 8
        uses: ./.github/actions/singularity
        with:
          linux_distro: "rockylinux8"
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  build-rockylinux9:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Rocky Linux 9
        uses: ./.github/actions/singularity
        with:
          linux_distro: "rockylinux9"
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  build-rhel9:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Red Hat Enterprise 9
        uses: ./.github/actions/singularity
        with:
          linux_distro: "rhel9"
          rh_user_name: ${{ secrets.RH_USER_NAME }}
          rh_user_pass: ${{ secrets.RH_USER_PASS }}
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  build-rhel8:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Apptainer 
        run: |
          sudo apt-get update && \
          sudo curl -LO https://github.com/apptainer/apptainer/releases/download/v1.3.5/apptainer_1.3.5_amd64.deb && \
          sudo apt install -y ./apptainer_1.3.5_amd64.deb && sudo rm -rf appt*
      - name: Build & Check Red Hat Enterprise 8
        uses: ./.github/actions/singularity
        with:
          linux_distro: "rhel8"
          rh_user_name: ${{ secrets.RH_USER_NAME }}
          rh_user_pass: ${{ secrets.RH_USER_PASS }}
          s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}