name: Singularity build and test
description: Receives parameter for linux distribution

inputs:
  linux_distro:
    description: Linux distro (e.g. focal)
    required: true
  rh_user_name:
    description: Red Hat username for RHEL subscriptions
    required: false
  rh_user_pass:
    description: Red Hat password for RHEL subscriptions
    required: false
  s3_bucket:
    description: S3 bucket for caching built container images
    required: false
  aws_role_arn:
    description: IAM role ARN to assume via OIDC for S3 access
    required: false
  aws_region:
    description: AWS region for S3 bucket
    required: false
    default: eu-west-1 


runs:
  using: composite
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false
        
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Configure AWS credentials
      if: ${{ inputs.s3_bucket != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Derive container image name from build.env
      shell: bash
      run: |
        PWB_VERSION=$( grep PWB_VERSION data/r-session-complete/build.env| cut -d "=" -f 2 )
        SLURM_VERSION=$( grep SLURM_VERSION data/r-session-complete/build.env| cut -d "=" -f 2)
        echo "IMAGE_NAME=session-pwb_${PWB_VERSION}-slurm_${SLURM_VERSION}-${{ inputs.linux_distro }}.sif" >> $GITHUB_ENV

    - name: Check S3 for cached image
      if: ${{ inputs.s3_bucket != '' }}
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        if aws s3 ls "s3://${{ inputs.s3_bucket }}/${IMAGE_NAME}" 2>/dev/null; then
          echo "Cache hit — image already exists in S3, skipping build and tests"
          echo "CACHE_HIT=true" >> $GITHUB_ENV
        else
          echo "No cached image found — will build"
          echo "CACHE_HIT=false" >> $GITHUB_ENV
        fi

    - name: Build r-session-complete
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
        RH_USER_NAME: ${{ inputs.rh_user_name }}
        RH_USER_PASS: ${{ inputs.rh_user_pass }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        echo "Building container" ; \
        if [ ! -z "$RH_USER_PASS" ]; then \
          sed -i "s|\$RH_USER_NAME|$RH_USER_NAME|g; s|\$RH_USER_PASS|$RH_USER_PASS|g" ../scripts/rhn.sh; \
        fi && \
        singularity build --force --build-arg-file ../build.env container.sif r-session-complete.sdef

    - name: Refresh AWS credentials for upload
      if: ${{ inputs.s3_bucket != '' && env.CACHE_HIT != 'true' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Upload image to S3
      if: ${{ inputs.s3_bucket != '' && env.CACHE_HIT != 'true' }}
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        echo "Uploading ${IMAGE_NAME} to S3"
        aws s3 cp data/r-session-complete/$linux_distro/container.sif "s3://${{ inputs.s3_bucket }}/${IMAGE_NAME}"

    - name: Print OS Release file
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif cat /etc/os-release
  
    - name: Test R versions sessionInfo() output
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        R_VERSIONS=`singularity run container.sif ls /opt/R` && \
        for R_VERSION in $R_VERSIONS; \
          do \
            echo "R Version $R_VERSION" && \
            echo "---------------------" && \
            echo " " && \
            singularity run container.sif /opt/R/${R_VERSION}/bin/R -q -e 'sessionInfo()'; \
          done

    - name: Test R versions for CRAN package availability (Seurat)
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        R_VERSIONS=`singularity run container.sif ls /opt/R` && \
        for R_VERSION in $R_VERSIONS; \
          do \
            echo "R Version $R_VERSION" && \
            echo "---------------------" && \
            echo " " && \
            singularity run container.sif /opt/R/${R_VERSION}/bin/R -q -e 'library(Seurat)'; \
          done

    - name: Test R versions for Bioconductor repo package availability (Voyager)
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        R_VERSIONS=`singularity run container.sif ls /opt/R` && \
        for R_VERSION in $R_VERSIONS; \
          do \
            echo "R Version $R_VERSION" && \
            echo "---------------------" && \
            echo " " && \
            singularity run container.sif /opt/R/${R_VERSION}/bin/R -q -e 'library(Voyager)'; \
          done

    - name: Test R versions if package can be installed (SuppDists)
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        R_VERSIONS=`singularity run container.sif ls /opt/R` && \
        for R_VERSION in $R_VERSIONS; \
          do \
            echo "R Version $R_VERSION" && \
            echo "---------------------" && \
            echo " " && \
            singularity run container.sif /opt/R/${R_VERSION}/bin/R -q -e 'd<-tempdir(); .libPaths(d); install.packages(\"SuppDists\"); unlink(d,recursive=TRUE)'; \
          done
          
    - name: Test R versions if Java integration works (rJava)
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        R_VERSIONS=`singularity run container.sif ls /opt/R` && \
        for R_VERSION in $R_VERSIONS; \
          do \
            echo "R Version $R_VERSION" && \
            echo "---------------------" && \
            singularity run container.sif /opt/R/${R_VERSION}/bin/R -q -e 'd<-tempdir(); .libPaths(d); install.packages(\"rJava\"); unlink(d,recursive=TRUE)'; \
          done

    - name: Test Python versions
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        PYTHON_VERSIONS=`singularity run container.sif ls /opt/python` && \
        for PYTHON_VERSION in $PYTHON_VERSIONS; \
          do \
            echo "Python Version $PYTHON_VERSION" && \
            echo "---------------------" && \
            echo " " && \
            singularity run container.sif /opt/python/${PYTHON_VERSION}/bin/python -c "import pwb_jupyterlab" && \
            singularity run container.sif /opt/python/${PYTHON_VERSION}/bin/pip install --break-system-packages numpy && \
            singularity run container.sif /opt/python/${PYTHON_VERSION}/bin/jupyter-nbextension list | grep rsp_jupyter; \
          done    
    
    - name: Test quarto versions
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif quarto -V

    - name: Test LaTeX presence
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif bash -c "source /etc/profile.d/texlive.sh && which latex"

    - name: Test LaTeX user-mode package install (framed)
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif bash -c \
          "source /etc/profile.d/texlive.sh && \
           tlmgr install framed && \
           pdflatex -interaction=nonstopmode ../scripts/test-framed.tex && \
           ls test-framed.pdf"

    - name: Test Session Components presence
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif ls -l /usr/lib/rstudio-server

    - name: Test Pro Driver presence
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif ls -l /opt/rstudio-drivers   

    - name: Test SLURM
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        singularity run container.sif which sinfo

    - name: List Container size
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        ls -lh container.sif 

    - name: Clean up everything
      if: env.CACHE_HIT != 'true'
      env:
        linux_distro: ${{ inputs.linux_distro }}
      shell: bash
      run: |
        cd data/r-session-complete/$linux_distro && \
        rm -rf ~/.apptainer && rm -f container.sif && \
        find /tmp/ -maxdepth 1 -not -user root | xargs rm -rf 

