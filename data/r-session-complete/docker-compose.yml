version: "3.2"

services:
  r-session-complete-hpc: 
    build:
      context: .
      dockerfile: ${LINUX_DISTRO:-rockylinux9}/Dockerfile
      args: 
        - PRO_DRIVERS_VERSION=${PRO_DRIVERS_VERSION:-2026.04.0}
        - QUARTO_VERSION=${QUARTO_VERSION:-1.9.38}
        - R_VERSION_LIST=${R_VERSION_LIST:-4.3.3 4.4.3 4.5.3 4.6.1}
        - R_VERSION_DEFAULT=${R_VERSION_DEFAULT:-4.6.1}
        - PYTHON_VERSION_LIST=${PYTHON_VERSION_LIST:-3.14.6 3.13.14 3.13.13}
        - PYTHON_VERSION_DEFAULT=${PYTHON_VERSION_DEFAULT:-3.13.14}
        - PWB_VERSION=${RSW_VERSION:-2026.06.0-242.pro13}
        - SLURM_VERSION=${SLURM_VERSION:-26.05.1}
    image: r-session-complete-hpc:${LINUX_DISTRO:-rockylinux9}-pwb-${RSW_VERSION:-2026.06.0-242.pro13}-slurm-${SLURM_VERSION:-26.05.1}
